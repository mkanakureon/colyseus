<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Map</title>
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #c9d1d9; font-family: "SF Mono", monospace; }
    #app { display: flex; height: 100vh; }
    #cy { flex: 1; }
    #sidebar {
      width: 300px; background: #161b22; border-left: 1px solid #30363d;
      padding: 16px; overflow-y: auto; font-size: 13px;
    }
    #sidebar h2 { color: #58a6ff; font-size: 14px; margin: 12px 0 4px; }
    #sidebar h2:first-child { margin-top: 0; }
    .dim { color: #6e7681; }
    .green { color: #3fb950; }
    .gold { color: #d29922; }
    .red { color: #f85149; }
    .purple { color: #d2a8ff; }
    .blue { color: #58a6ff; }
    #legend { margin-top: 16px; font-size: 11px; line-height: 1.8; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    a.back { color: #6e7681; text-decoration: none; font-size: 12px; }
    a.back:hover { color: #c9d1d9; }
  </style>
</head>
<body>
  <div id="app">
    <div id="cy"></div>
    <div id="sidebar">
      <a class="back" href="/">← Game</a>
      <h2>Game Map</h2>
      <div id="detail" class="dim">ノードをクリック</div>
      <div id="legend">
        <h2>Legend</h2>
        <div><span class="dot" style="background:#388bfd"></span>Safe Zone</div>
        <div><span class="dot" style="background:#f85149"></span>Danger Zone</div>
        <div><span class="dot" style="background:#d2a8ff"></span>NPC</div>
        <div><span class="dot" style="background:#d29922"></span>NPC (Shop)</div>
        <div><span class="dot" style="background:#3fb950"></span>NPC (Quest)</div>
        <div><span class="dot" style="background:#58a6ff"></span>Quest</div>
        <div><span class="dot" style="background:#da3633"></span>Boss</div>
        <div style="margin-top:8px"><span class="dim">━━</span> Zone link</div>
        <div><span class="green">→</span> Quest target</div>
      </div>
    </div>
  </div>
<script>
// Zone grid positions (matching the world map layout)
const ZONE_POS = {
  "zone-001-village": { x: 400, y: 600 },
  "zone-002-forest":  { x: 200, y: 400 },
  "zone-003-market":  { x: 600, y: 400 },
  "zone-004-capital": { x: 400, y: 400 },
  "zone-005-ruins":   { x: 200, y: 600 },
  "zone-006-cave":    { x: 600, y: 200 },
  "zone-007-port":    { x: 400, y: 200 },
  "zone-008-sewer":   { x: 200, y: 200 },
  "zone-009-volcano": { x: 600, y: 0 },
  "zone-010-pass":    { x: 400, y: 0 },
  "zone-011-ice":     { x: 200, y: 0 },
  "zone-012-temple":  { x: 400, y: -200 },
};

let cy = null;
let gameData = null;

async function init() {
  try {
    const res = await fetch("/api/game-data");
    gameData = await res.json();
  } catch {
    document.getElementById("detail").innerHTML = '<div class="red">Failed to load. Run: npx tsx mmo/server.ts</div>';
    return;
  }
  buildGraph();
}

function buildGraph() {
  const elements = [];
  const SCALE = 1.5;

  // ── Zones ──
  for (const zone of gameData.zones) {
    const pos = ZONE_POS[zone.id] || { x: 0, y: 0 };
    const enc = gameData.encounters?.[zone.id];
    const enemies = enc ? enc.enemies.map(e => gameData.enemies[e.enemyId]?.name).filter(Boolean).join(", ") : "";

    elements.push({
      data: {
        id: zone.id,
        label: zone.name,
        type: "zone",
        safe: zone.isSafe,
        desc: zone.description,
        enemies,
        npcCount: zone.npcs.length,
      },
      position: { x: pos.x * SCALE, y: pos.y * SCALE },
    });

    // ── NPCs (positioned near their zone) ──
    zone.npcs.forEach((npc, i) => {
      const angle = (i / Math.max(zone.npcs.length, 1)) * Math.PI * 2 - Math.PI / 2;
      const r = 80;
      const nx = pos.x * SCALE + Math.cos(angle) * r;
      const ny = pos.y * SCALE + Math.sin(angle) * r;

      const hasShop = !!npc.shop;
      const hasQuest = (npc.quests || []).length > 0;
      const pool = gameData.npcConversations?.[npc.id];
      const roles = [];
      if (hasShop) roles.push("Shop");
      if (hasQuest) roles.push(`Quest(${npc.quests.length})`);
      if (pool) roles.push("Pool");

      elements.push({
        data: {
          id: npc.id, label: npc.name,
          type: "npc", hasShop, hasQuest, hasPool: !!pool,
          roles: roles.join(" "),
          zone: zone.name,
          shop: npc.shop ? gameData.shops[npc.shop]?.items?.join(", ") : null,
          questIds: npc.quests || [],
        },
        position: { x: nx, y: ny },
      });

      // NPC → Zone edge
      elements.push({ data: { source: zone.id, target: npc.id, type: "has_npc" } });
    });

    // ── Zone adjacency edges ──
    for (const adj of zone.adjacentZones) {
      const key = [zone.id, adj.zoneId].sort().join("~");
      if (!elements.find(e => e.data?.id === key)) {
        elements.push({ data: { id: key, source: zone.id, target: adj.zoneId, type: "adjacent" } });
      }
    }
  }

  // ── Quests ──
  for (const [qId, quest] of Object.entries(gameData.quests)) {
    // Find giver NPC position
    const giverNpc = findNpc(quest.giver);
    const giverZone = findNpcZone(quest.giver);
    const giverPos = giverZone ? ZONE_POS[giverZone.id] : { x: 0, y: 0 };

    // Quest node near giver
    elements.push({
      data: {
        id: qId,
        label: quest.name,
        type: "quest",
        desc: quest.description,
        giver: giverNpc?.name || quest.giver,
        rewards: `${quest.rewards.exp}EXP ${quest.rewards.gold}G`,
        objectives: quest.objectives.map(o => `${o.type}: ${o.targetName} x${o.required}`).join("\n"),
      },
      position: {
        x: (giverPos?.x || 0) * SCALE + 150,
        y: (giverPos?.y || 0) * SCALE + 40,
      },
    });

    // Giver NPC → Quest edge
    elements.push({ data: { source: quest.giver, target: qId, type: "gives_quest" } });

    // Quest → Target zone edges
    for (const obj of quest.objectives) {
      if (obj.type === "defeat") {
        for (const [zId, enc] of Object.entries(gameData.encounters)) {
          if (enc.enemies?.some(e => e.enemyId === obj.targetId)) {
            elements.push({ data: { source: qId, target: zId, type: "quest_target", label: `${obj.targetName}x${obj.required}` } });
          }
        }
      }
      if (obj.type === "visit") {
        if (gameData.zones.find(z => z.id === obj.targetId)) {
          elements.push({ data: { source: qId, target: obj.targetId, type: "quest_target", label: "visit" } });
        }
      }
    }
  }

  // ── Bosses ──
  for (const [id, boss] of Object.entries(gameData.bosses)) {
    const bossZone = ZONE_POS[boss.zoneId] || { x: 0, y: 0 };
    elements.push({
      data: {
        id: `boss-${id}`, label: boss.name,
        type: "boss",
        hp: boss.hp, exp: boss.exp, gold: boss.gold,
        special: boss.specialAttack ? `${boss.specialAttack.name} (${boss.specialAttack.damage}dmg ${boss.specialAttack.aoe ? "AOE" : ""})` : "",
      },
      position: { x: bossZone.x * SCALE - 120, y: bossZone.y * SCALE },
    });
    if (gameData.zones.find(z => z.id === boss.zoneId)) {
      elements.push({ data: { source: boss.zoneId, target: `boss-${id}`, type: "has_boss" } });
    }
  }

  // ── Render ──
  cy = cytoscape({
    container: document.getElementById("cy"),
    elements,
    layout: { name: "preset" }, // Use our coordinates
    style: [
      // Zones
      { selector: 'node[type="zone"]', style: {
        "shape": "round-rectangle", "width": 100, "height": 40,
        "background-color": el => el.data("safe") ? "#1a3a5c" : "#5c1a1a",
        "border-width": 2, "border-color": el => el.data("safe") ? "#388bfd" : "#f85149",
        "label": "data(label)", "text-valign": "center", "font-size": 11,
        "color": "#c9d1d9", "text-outline-color": "#0d1117", "text-outline-width": 1,
      }},
      // NPCs
      { selector: 'node[type="npc"]', style: {
        "shape": "ellipse", "width": 20, "height": 20,
        "background-color": el => el.data("hasShop") ? "#d29922" : el.data("hasQuest") ? "#3fb950" : "#d2a8ff",
        "label": "data(label)", "font-size": 9, "text-valign": "top", "text-margin-y": -4,
        "color": "#8b949e", "text-outline-color": "#0d1117", "text-outline-width": 1,
      }},
      // Quests
      { selector: 'node[type="quest"]', style: {
        "shape": "diamond", "width": 30, "height": 30,
        "background-color": "#1a3352", "border-width": 2, "border-color": "#58a6ff",
        "label": "data(label)", "font-size": 9, "text-valign": "top", "text-margin-y": -4,
        "color": "#58a6ff", "text-outline-color": "#0d1117", "text-outline-width": 1,
      }},
      // Bosses
      { selector: 'node[type="boss"]', style: {
        "shape": "star", "width": 35, "height": 35,
        "background-color": "#5c1a1a", "border-width": 2, "border-color": "#da3633",
        "label": "data(label)", "font-size": 9, "text-valign": "top", "text-margin-y": -4,
        "color": "#f85149", "text-outline-color": "#0d1117", "text-outline-width": 1,
      }},
      // Zone connections
      { selector: 'edge[type="adjacent"]', style: {
        "width": 3, "line-color": "#30363d", "curve-style": "straight",
      }},
      // NPC → Zone
      { selector: 'edge[type="has_npc"]', style: {
        "width": 1, "line-color": "#21262d", "line-style": "dotted", "curve-style": "straight",
      }},
      // Boss → Zone
      { selector: 'edge[type="has_boss"]', style: {
        "width": 2, "line-color": "#5c1a1a", "line-style": "dashed", "curve-style": "straight",
      }},
      // Quest edges
      { selector: 'edge[type="gives_quest"]', style: {
        "width": 1.5, "line-color": "#58a6ff40", "curve-style": "bezier",
        "target-arrow-shape": "triangle", "target-arrow-color": "#58a6ff40", "arrow-scale": 0.6,
      }},
      { selector: 'edge[type="quest_target"]', style: {
        "width": 2, "line-color": "#3fb95080", "curve-style": "bezier",
        "target-arrow-shape": "triangle", "target-arrow-color": "#3fb95080", "arrow-scale": 0.8,
        "label": "data(label)", "font-size": 8, "color": "#3fb950", "text-outline-color": "#0d1117", "text-outline-width": 1,
      }},
      // Highlight style
      { selector: ".highlighted", style: { "overlay-color": "#58a6ff", "overlay-padding": 4, "overlay-opacity": 0.15 } },
    ],
    minZoom: 0.3, maxZoom: 3,
    wheelSensitivity: 0.3,
  });

  // Click handler — detailed dev info
  cy.on("tap", "node", evt => {
    const d = evt.target.data();
    let html = "";

    if (d.type === "zone") {
      html = `<div class="dim">ZONE</div><h2>${d.label}</h2>`;
      html += `<div class="dim" style="margin-bottom:8px">${d.id}</div>`;
      html += `<div>${d.desc}</div>`;
      html += `<div class="${d.safe ? 'green' : 'red'}" style="margin:8px 0">${d.safe ? "Safe Zone" : "Danger Zone"}</div>`;

      // NPCs in this zone
      const zone = gameData.zones.find(z => z.id === d.id);
      if (zone?.npcs?.length) {
        html += `<h2>NPCs (${zone.npcs.length})</h2>`;
        zone.npcs.forEach(n => {
          const roles = [];
          if (n.shop) roles.push('<span class="gold">Shop</span>');
          if ((n.quests||[]).length) roles.push(`<span class="green">Quest(${n.quests.length})</span>`);
          html += `<div style="padding:2px 0">${n.name} ${roles.join(" ")}</div>`;
        });
      }

      // Enemies
      if (d.enemies) {
        html += `<h2>Enemies</h2>`;
        const enc = gameData.encounters[d.id];
        if (enc) enc.enemies.forEach(e => {
          const enemy = gameData.enemies[e.enemyId];
          if (enemy) html += `<div style="padding:2px 0">${enemy.name} HP:${enemy.hp} ATK:${enemy.atk} <span class="dim">(weight:${e.weight})</span></div>`;
        });
      }

      // Adjacent
      if (zone?.adjacentZones?.length) {
        html += `<h2>Connections</h2>`;
        const dirNames = { north:"北↑", south:"南↓", east:"東→", west:"西←" };
        zone.adjacentZones.forEach(a => {
          const t = gameData.zones.find(z => z.id === a.zoneId);
          html += `<div>${dirNames[a.direction]||a.direction} ${t?.name||a.zoneId}</div>`;
        });
      }

    } else if (d.type === "npc") {
      html = `<div class="dim">NPC</div><h2 class="purple">${d.label}</h2>`;
      html += `<div class="dim" style="margin-bottom:4px">${d.id} @ ${d.zone}</div>`;
      if (d.roles) html += `<div style="margin-bottom:8px">${d.roles}</div>`;

      // Conversation pool
      const pool = gameData.npcConversations?.[d.id];
      if (pool) {
        const daily = pool.daily?.length || 0;
        const ctx = pool.contextual?.length || 0;
        const sp = pool.special?.length || 0;
        html += `<h2>Conversation Pool</h2>`;
        html += `<div>Daily: ${daily} / Contextual: ${ctx} / Special: ${sp}</div>`;

        // Contextual conditions
        if (pool.contextual?.length) {
          html += `<h2>Contextual Conditions</h2>`;
          pool.contextual.forEach(c => {
            html += `<div style="padding:3px 0;border-bottom:1px solid #21262d">`;
            html += `<div class="blue">${c.label}</div>`;
            if (c.condition) {
              const cond = c.condition;
              if (cond.relationMin != null) html += `<div class="dim">  関係値 >= ${cond.relationMin}</div>`;
              if (cond.relationMax != null) html += `<div class="dim">  関係値 <= ${cond.relationMax}</div>`;
              if (cond.questFlags?.length) html += `<div class="dim">  完了クエスト: ${cond.questFlags.join(", ")}</div>`;
              if (cond.questActive?.length) html += `<div class="dim">  進行中クエスト: ${cond.questActive.join(", ")}</div>`;
              if (cond.once) html += `<div class="dim">  一度のみ</div>`;
            }
            html += `</div>`;
          });
        }

        // Special
        if (pool.special?.length) {
          html += `<h2>Special Conversations</h2>`;
          pool.special.forEach(s => {
            html += `<div>${s.label}`;
            if (s.condition?.once) html += ` <span class="dim">(once)</span>`;
            html += `</div>`;
          });
        }
      } else {
        html += `<div class="dim" style="margin:8px 0">Legacy dialogue (no pool)</div>`;
      }

      // Shop items
      if (d.hasShop && gameData.shops[d.id]) {
        const shop = gameData.shops[d.id];
        html += `<h2>Shop Items</h2>`;
        shop.items.forEach(itemId => {
          const item = gameData.items[itemId] || gameData.equipment[itemId];
          if (item) {
            let info = `${item.buyPrice}G`;
            if (item.effect) info += ` (${item.effect.type}: +${item.effect.value})`;
            if (item.atk) info += ` ATK+${item.atk}`;
            if (item.def) info += ` DEF+${item.def}`;
            html += `<div style="padding:2px 0"><span class="gold">${item.name}</span> <span class="dim">${info}</span></div>`;
          }
        });
      }

      // Quest flow: NPC → quests with full details
      if (d.questIds?.length) {
        html += `<h2>Quest Flow</h2>`;
        d.questIds.forEach(qId => {
          const quest = gameData.quests[qId];
          if (!quest) return;

          // Is this NPC the giver or just a board?
          const isGiver = quest.giver === d.id;

          html += `<div style="padding:6px 0;border-bottom:1px solid #21262d">`;
          html += `<div class="blue">${qId}: ${quest.name}</div>`;
          html += `<div class="dim">${quest.description}</div>`;
          html += `<div style="margin:4px 0">`;
          html += isGiver
            ? `<span class="green">依頼者（このNPC）</span>`
            : `<span class="dim">掲示板表示（依頼者: ${quest.giver}）</span>`;
          html += `</div>`;

          // Objectives with location
          html += `<div style="margin:4px 0">`;
          quest.objectives.forEach(obj => {
            let loc = "";
            if (obj.type === "defeat") {
              const zones = Object.entries(gameData.encounters)
                .filter(([,enc]) => enc.enemies?.some(e => e.enemyId === obj.targetId))
                .map(([zId]) => gameData.zones.find(z => z.id === zId)?.name || zId);
              loc = zones.length ? zones.join(", ") : "?";
            }
            if (obj.type === "visit") {
              const z = gameData.zones.find(z => z.id === obj.targetId);
              loc = z?.name || obj.targetId;
            }
            const typeIcon = obj.type === "defeat" ? "⚔" : obj.type === "collect" ? "📦" : "📍";
            html += `<div>${typeIcon} ${obj.targetName} x${obj.required}`;
            if (loc) html += ` <span class="dim">@ ${loc}</span>`;
            html += `</div>`;
          });
          html += `</div>`;

          // Rewards
          const ri = quest.rewards.items?.map(i => `${i.name}x${i.quantity}`).join(", ") || "";
          html += `<div class="green">${quest.rewards.exp}EXP ${quest.rewards.gold}G${ri ? " " + ri : ""}</div>`;

          // Player flow
          html += `<div class="dim" style="margin-top:4px;font-size:11px">`;
          html += `Flow: 話しかける → クエスト → 受注 → `;
          quest.objectives.forEach(obj => {
            if (obj.type === "defeat") html += `${obj.targetName}を${obj.required}体倒す → `;
            if (obj.type === "collect") html += `${obj.targetName}を${obj.required}個集める → `;
            if (obj.type === "visit") html += `${obj.targetName}に行く → `;
          });
          html += isGiver ? `このNPCに報告 → 報酬` : `${quest.giver}に報告 → 報酬`;
          html += `</div>`;

          html += `</div>`;
        });
      }

    } else if (d.type === "quest") {
      html = `<div class="dim">QUEST</div><h2 class="blue">${d.label}</h2>`;
      html += `<div class="dim" style="margin-bottom:4px">${d.id}</div>`;
      html += `<div>${d.desc}</div>`;
      html += `<div style="margin:8px 0">依頼者: ${d.giver}</div>`;
      html += `<div style="white-space:pre">${d.objectives}</div>`;
      html += `<div class="green" style="margin-top:8px">${d.rewards}</div>`;

      // Where can you get this quest?
      const availableAt = [];
      for (const zone of gameData.zones) {
        for (const npc of zone.npcs) {
          if ((npc.quests || []).includes(d.id)) {
            availableAt.push(`${npc.name} (${zone.name})`);
          }
        }
      }
      if (availableAt.length) {
        html += `<h2>受注可能NPC</h2>`;
        availableAt.forEach(a => html += `<div>${a}</div>`);
      }

    } else if (d.type === "boss") {
      html = `<div class="dim">BOSS</div><h2 class="red">${d.label}</h2>`;
      html += `<div style="margin:8px 0">HP:${d.hp} EXP:${d.exp} Gold:${d.gold}</div>`;
      if (d.special) html += `<div class="gold">Special: ${d.special}</div>`;
      html += `<div class="dim" style="margin-top:8px">逃走不可 / パーティ推奨</div>`;

      // Drops
      const boss = Object.values(gameData.bosses).find(b => `boss-${b.id}` === d.id);
      if (boss?.drops?.length) {
        html += `<h2>Drops</h2>`;
        boss.drops.forEach(dr => {
          html += `<div>${dr.itemId} <span class="dim">(${dr.chance * 100}%)</span></div>`;
        });
      }
    }

    document.getElementById("detail").innerHTML = html;

    // Highlight connected edges
    cy.elements().removeClass("highlighted");
    evt.target.addClass("highlighted");
    evt.target.connectedEdges().addClass("highlighted");
    evt.target.connectedEdges().connectedNodes().addClass("highlighted");
  });

  cy.on("tap", evt => {
    if (evt.target === cy) {
      cy.elements().removeClass("highlighted");
      document.getElementById("detail").innerHTML = '<span class="dim">ノードをクリック</span>';
    }
  });

  // Fit to view
  cy.fit(null, 50);
}

function findNpc(npcId) {
  for (const z of gameData.zones) { const n = z.npcs.find(n => n.id === npcId); if (n) return n; }
  return null;
}
function findNpcZone(npcId) {
  for (const z of gameData.zones) { if (z.npcs.find(n => n.id === npcId)) return z; }
  return null;
}

init();
</script>
</body>
</html>
